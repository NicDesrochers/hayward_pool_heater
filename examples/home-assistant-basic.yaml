substitutions:
  device_name: hayward-heater
  friendly_name: Hayward Heater
  txrx_pin: GPIO16

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source: github://sle118/hayward_pool_heater
    components: [hwp]

logger:
  level: INFO
  logs:
    hwp: INFO
    hwp.pk: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret ap_password

captive_portal:

safe_mode:
  boot_is_good_after: 1min

status_led:
  pin: GPIO2

button:
  - platform: restart
    name: Restart Device

switch:
  - platform: safe_mode
    name: Restart In Safe Mode

climate:
  - platform: hwp
    id: pool_heater
    name: Pool Heater
    pin_txrx: ${txrx_pin}
